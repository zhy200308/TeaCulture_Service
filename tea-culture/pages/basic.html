<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础茶识库</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/basic.css">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo"><i class="fas fa-leaf"></i></div>
        <nav class="nav-menu">
            <a href="../index.html">首页</a>
            <a href="./basic.html" class="active">基础茶识</a>
            <a href="./advanced.html">进阶专题</a>
            <a href="./scenario.html">场景教程</a>
            <a href="./tea-food.html">茶食搭配</a>
        </nav>
    </div>
</header>

<div class="container">
    <aside class="category-sidebar">
        <h3 class="sidebar-title">茶识分类</h3>
        <!-- 分类按钮由 JS 动态加载 -->
        <div class="category-list"></div>
    </aside>

    <main class="content-area">
        <section class="video-area">
            <h3><i class="fas fa-video"></i> 茶史解说</h3>
            <div class="video-container">
                <video controls poster="">
                    <source src="../images/1.1.mp4" type="video/mp4">
                </video>
            </div>
        </section>

        <section class="teaware-area">
            <h3><i class="fas fa-cup"></i> 常用茶器</h3>
            <!-- 茶器列表由 JS 动态加载 -->
            <div class="teaware-list"></div>
        </section>

        <section class="knowledge-area">
            <h3><i class="fas fa-book-open"></i> 茶识知识库</h3>
            <!-- 知识列表由 JS 动态加载 -->
            <div class="knowledge-list" id="knowledgeList"></div>
        </section>
    </main>
</div>

<div class="modal" id="detailModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script src="../assets/api.js"></script>
<script src="../assets/basic.js"></script>
</body>
</html>
