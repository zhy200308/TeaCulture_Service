<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f9f7f4; color: #333; }

        header {
            background-color: #4a7c59;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 99;
        }
        .nav-container {
            max-width: 100%; height: 65px; display: flex;
            align-items: center; justify-content: space-between; padding: 0 30px;
        }
        .logo { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 22px; }
        .logo i { font-size: 24px; }
        .nav-right { display: flex; align-items: center; gap: 20px; color: #fff; }
        .nav-user-text { font-size: 15px; }
        .nav-btn {
            background-color: rgba(255,255,255,0.2);
            color: #fff; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; text-decoration: none;
            font-size: 14px; transition: 0.2s;
        }
        .nav-btn:hover { background-color: rgba(255,255,255,0.3); }

        .admin-layout { display: flex; min-height: calc(100vh - 65px); }
        .admin-sidebar { width: 240px; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .sidebar-menu { padding: 20px 0; }
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 25px; cursor: pointer; transition: 0.2s;
            font-size: 15px; color: #555;
        }
        .menu-item i { width: 18px; text-align: center; color: #4a7c59; }
        .menu-item:hover, .menu-item.active {
            background-color: #f0f7f5; color: #4a7c59; font-weight: 500;
        }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .section-title {
            font-size: 22px; color: #4a7c59; margin-bottom: 25px;
            display: flex; align-items: center; gap: 10px;
        }
        .data-table {
            width: 100%; background: #fff; border-collapse: collapse;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .data-table th, .data-table td {
            padding: 14px 15px; text-align: left; border-bottom: 1px solid #f0f0f0;
        }
        .data-table th { background-color: #f8f6f2; color: #4a7c59; font-weight: 500; }
        .add-btn {
            background: #4a7c59; color: #fff; border: none;
            padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .action-btn {
            padding: 5px 10px; border-radius: 4px; border: none;
            font-size: 12px; cursor: pointer; margin-right: 5px;
        }
        .action-btn.edit { background: #4099ff; color: #fff; }
        .action-btn.delete { background: #ff5252; color: #fff; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .status-badge.published, .status-badge.active { background: #e6f7ef; color: #06c19a; }
        .panel-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 18px;
        }
        .content-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            padding: 9px 18px; border: none; background: #fff;
            border-radius: 6px; cursor: pointer;
        }
        .tab-btn.active { background: #4a7c59; color: #fff; }
        .content-panel { display: none; }
        .content-panel.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <div class="logo-text">茶文化服务平台 - 管理后台</div>
        </div>
        <div class="nav-right">
            <span class="nav-user-text"><i class="fas fa-shield-alt"></i> 管理员</span>
            <a href="../index.html" class="nav-btn"><i class="fas fa-sign-out-alt"></i> 返回首页</a>
        </div>
    </div>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="showSection('users')">
                <i class="fas fa-users"></i><span>用户管理</span>
            </div>
            <div class="menu-item" onclick="showSection('content')">
                <i class="fas fa-book-open"></i><span>内容管理</span>
            </div>
            <div class="menu-item" onclick="showSection('feedback')">
                <i class="fas fa-comment-dots"></i><span>反馈管理</span>
            </div>
        </div>
    </aside>

    <main class="admin-main">
        <!-- 用户管理 -->
        <section id="users" class="admin-section active">
            <h2 class="section-title"><i class="fas fa-users"></i> 用户管理</h2>
            <table class="data-table">
                <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr><td colspan="5" align="center">加载中...</td></tr></tbody>
            </table>
        </section>

        <!-- 内容管理 -->
        <section id="content" class="admin-section">
            <h2 class="section-title"><i class="fas fa-book-open"></i> 内容管理</h2>
            <div class="content-tabs">
                <button class="tab-btn active" onclick="showTab('basic-knowledge')">基础茶识</button>
                <button class="tab-btn" onclick="showTab('advanced-topics')">进阶专题</button>
                <button class="tab-btn" onclick="showTab('scenario-tutorials')">场景教程</button>
            </div>
            <div class="content-panel active" id="basic-knowledge"></div>
            <div class="content-panel" id="advanced-topics"></div>
            <div class="content-panel" id="scenario-tutorials"></div>
        </section>

        <!-- 反馈管理 -->
        <section id="feedback" class="admin-section">
            <h2 class="section-title"><i class="fas fa-comment-dots"></i> 反馈管理</h2>
            <table class="data-table">
                <thead><tr><th>ID</th><th>用户</th><th>类型</th><th>内容</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr><td colspan="6" align="center">加载中...</td></tr></tbody>
            </table>
        </section>
    </main>
</div>

<script src="../assets/api.js"></script>
<script src="../assets/admin.js"></script>

</body>
</html>
