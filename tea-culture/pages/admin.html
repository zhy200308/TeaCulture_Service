<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/admin-common.css">
    <link rel="stylesheet" href="../assets/admin-dashboard.css">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <div class="logo-text">茶文化服务平台 - 管理后台</div>
        </div>
        <div class="nav-right">
            <span class="nav-user-text"><i class="fas fa-shield-alt"></i> <span id="adminUserText">管理员</span></span>
            <a href="../index.html" class="nav-btn"><i class="fas fa-sign-out-alt"></i> 返回首页</a>
            <a href="./login.html" class="nav-btn" id="adminLogoutBtn"><i class="fas fa-right-from-bracket"></i> 退出</a>
        </div>
    </div>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-menu" id="adminSidebar"></div>
    </aside>

    <main class="admin-main">
        <h2 class="page-title"><i class="fas fa-gauge"></i> 管理后台</h2>
        <div class="dash-grid">
            <div class="dash-card"><div class="label">用户数</div><div class="value" id="kpiUserCount">0</div></div>
            <div class="dash-card"><div class="label">茶识数量</div><div class="value" id="kpiKnowledgeCount">0</div></div>
            <div class="dash-card"><div class="label">专题数量</div><div class="value" id="kpiTopicCount">0</div></div>
            <div class="dash-card"><div class="label">场景教程数量</div><div class="value" id="kpiScenarioCount">0</div></div>
            <div class="dash-card"><div class="label">茶食搭配数量</div><div class="value" id="kpiFoodCount">0</div></div>
        </div>

        <div class="dash-panels">
            <div class="dash-panel">
                <h3>收藏统计</h3>
                <div id="favChart"></div>
                <div class="small-note" id="favNote"></div>
            </div>
            <div class="dash-panel">
                <h3>学习记录（近7天）</h3>
                <div id="learnChart"></div>
                <div class="small-note">按天统计</div>
                <h3 style="margin-top:14px;">学习记录（按模块）</h3>
                <div id="learnTypeChart"></div>
            </div>
        </div>
    </main>
</div>

<script src="../assets/api.js"></script>
<script src="../assets/admin-common.js"></script>
<script src="../assets/admin-dashboard.js"></script>

</body>
</html>
