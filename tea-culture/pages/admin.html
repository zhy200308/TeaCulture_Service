<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/admin-common.css">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <div class="logo-text">茶文化服务平台 - 管理后台</div>
        </div>
        <div class="nav-right">
            <span class="nav-user-text"><i class="fas fa-shield-alt"></i> <span id="adminUserText">管理员</span></span>
            <a href="../index.html" class="nav-btn"><i class="fas fa-sign-out-alt"></i> 返回首页</a>
            <a href="./login.html" class="nav-btn" id="adminLogoutBtn"><i class="fas fa-right-from-bracket"></i> 退出</a>
        </div>
    </div>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-menu" id="adminSidebar"></div>
    </aside>

    <main class="admin-main">
        <h2 class="page-title"><i class="fas fa-gauge"></i> 管理后台</h2>
        <div style="background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">
            <div style="color:#666;line-height:1.8;">
                请从左侧选择需要管理的模块。所有模块均支持分页、模糊搜索与批量删除；内容模块支持新增/编辑/删除。
            </div>
        </div>
    </main>
</div>

<script src="../assets/api.js"></script>
<script src="../assets/admin-common.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!AdminCommon.requireAdmin()) return;
        AdminCommon.bindAdminHeader();
    });
</script>

</body>
</html>
