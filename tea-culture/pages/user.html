<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/user.css">
    <style>
        /* 用户弹窗样式 */
        .user-modal-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.45); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .user-modal {
            background: #fff; border-radius: 12px; padding: 30px;
            width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto;
        }
        .user-modal h3 { color: #4a7c59; margin-bottom: 20px; }
        .user-modal h4 { color: #4a7c59; margin: 15px 0 10px; }
        .user-modal .form-item { margin-bottom: 15px; }
        .user-modal .form-item label { display: block; color: #555; font-size: 14px; margin-bottom: 6px; }
        .user-modal input, .user-modal textarea, .user-modal select {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
            outline: none; font-size: 14px; resize: vertical;
        }
        .user-modal input:focus, .user-modal textarea:focus { border-color: #4a7c59; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-btns button {
            padding: 8px 18px; border: 1px solid #ddd; background: #fff;
            border-radius: 6px; cursor: pointer;
        }
        .modal-btns button.primary { background: #4a7c59; color: #fff; border-color: #4a7c59; }
        .fav-list { max-height: 420px; overflow-y: auto; }
        .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .fav-card { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; }
        .fav-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
        .fav-card-img { height: 110px; background: #f8f6f2; display: flex; align-items: center; justify-content: center; }
        .fav-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .fav-card-img i { font-size: 34px; color: #8b5a2b; opacity: .75; }
        .fav-card-body { padding: 10px; }
        .fav-card-title { font-weight: 600; color: #333; font-size: 14px; line-height: 1.4; height: 40px; overflow: hidden; }
        .fav-card-type { margin-top: 8px; display: inline-block; background: #f0e6d8; color: #8b5a2b; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .fav-card-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
        .fav-card-actions button { background: #ff5252; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .match-info { font-size: 15px; margin: 10px 0; line-height: 1.8; color: #333; }
        .match-info strong { color: #8b5a2b; }
        .note-box { background: #f8f6f2; border-left: 4px solid #d4a574; padding: 12px 15px; margin: 15px 0; border-radius: 8px; }
        .note-box h4 { color: #8b5a2b; margin-bottom: 6px; font-size: 16px; }
        .note-box p { color: #555; font-size: 14px; }
        .param-section { margin-top: 18px; background: #f8f6f2; padding: 15px; border-radius: 10px; }
        .param-section h4 { color: #8b5a2b; margin-bottom: 12px; font-size: 18px; }
        .param-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .param-item { background: #fff; border-radius: 8px; padding: 12px; border: 1px solid #f0e6d8; }
        .param-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .param-value { font-size: 16px; font-weight: bold; color: #8b5a2b; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <div class="logo-text">茶文化服务平台</div>
            </div>
            <div class="nav-right">
                <span class="nav-user-text"><i class="fas fa-user-circle"></i> 欢迎你，茶友用户</span>
                <a href="../index.html" class="nav-btn"><i class="fas fa-home"></i> 返回首页</a>
                <a href="./login.html" class="nav-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
            </div>
        </div>
    </header>

    <div class="user-center-wrap">
        <div class="user-card">
            <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
            <h2 class="user-name">茶友会员用户</h2>
            <p class="user-desc">热爱茶文化，静心品茶，乐享生活</p>
            <div class="user-tag">普通会员 · 茶文化爱好者</div>
        </div>

        <div class="user-menu-box">
            <div class="user-menu-item">
                <i class="fas fa-id-card"></i>
                <span>个人资料修改</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-heart"></i>
                <span>我的收藏茶知识</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-question-circle"></i>
                <span>意见反馈中心</span>
            </div>
        </div>
    </div>

    <script src="../assets/api.js"></script>
    <script src="../assets/user.js"></script>
</body>
</html>
