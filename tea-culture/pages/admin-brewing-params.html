<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冲泡参数管理 - 管理后台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/admin-common.css">
</head>
<body>
<header>
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <div class="logo-text">茶文化服务平台 - 管理后台</div>
        </div>
        <div class="nav-right">
            <span class="nav-user-text"><i class="fas fa-shield-alt"></i> <span id="adminUserText">管理员</span></span>
            <a href="./admin.html" class="nav-btn"><i class="fas fa-gauge"></i> 控制台</a>
            <a href="../index.html" class="nav-btn"><i class="fas fa-house"></i> 首页</a>
            <a href="./login.html" class="nav-btn" id="adminLogoutBtn"><i class="fas fa-right-from-bracket"></i> 退出</a>
        </div>
    </div>
</header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-menu" id="adminSidebar"></div>
    </aside>

    <main class="admin-main">
        <h2 class="page-title"><i class="fas fa-sliders"></i> 冲泡参数管理</h2>

        <div class="toolbar">
            <select id="scenarioId">
                <option value="">全部场景</option>
            </select>
            <input id="keyword" type="text" placeholder="茶类/备注 模糊搜索">
            <button class="btn primary" id="searchBtn"><i class="fas fa-magnifying-glass"></i> 查询</button>
            <button class="btn light" id="resetBtn"><i class="fas fa-rotate-left"></i> 重置</button>
            <button class="btn primary" id="addBtn"><i class="fas fa-plus"></i> 新增</button>
            <button class="btn danger" id="batchDeleteBtn"><i class="fas fa-trash"></i> 批量删除</button>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th style="width:44px;"><input type="checkbox" id="checkAll"></th>
                <th style="width:140px;">ID</th>
                <th style="width:220px;">场景</th>
                <th style="width:120px;">茶类</th>
                <th style="width:120px;">水温</th>
                <th style="width:120px;">投茶量</th>
                <th style="width:120px;">冲泡时长</th>
                <th style="width:220px;">操作</th>
            </tr>
            </thead>
            <tbody id="tbody">
            <tr><td colspan="8" align="center">加载中...</td></tr>
            </tbody>
        </table>

        <div class="pagination">
            <button class="btn light" id="prevBtn"><i class="fas fa-chevron-left"></i> 上一页</button>
            <button class="btn light" id="nextBtn">下一页 <i class="fas fa-chevron-right"></i></button>
            <span class="page-info" id="pageInfo"></span>
        </div>
    </main>
</div>

<script src="../assets/api.js"></script>
<script src="../assets/admin-common.js"></script>
<script src="../assets/admin-brewing-params.js"></script>
</body>
</html>
