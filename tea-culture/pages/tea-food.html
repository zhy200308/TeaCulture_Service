<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶食搭配</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="../assets/mqtt-sim.js"></script>
    <script src="../assets/validator.js"></script>
    <link rel="stylesheet" href="../assets/site-header.css">
    <link rel="stylesheet" href="../assets/tea-food.css">
</head>
<body>
    <header id="siteHeader"></header>

    <div class="container">
        <div class="food-title">
            <h2>茶食搭配指南</h2>
            <p>选对茶食搭配，让茶香与食味相得益彰</p>
        </div>

        <div class="device-status-bar">
            <span>智能茶器：</span>
            <span id="deviceStatusText">检测中</span>
            <span class="status-indicator" id="deviceStatusIndicator"></span>
        </div>

        <div class="tea-tabs">
            <div class="tea-btn active" data-tea="all">全部茶类</div>
            <div class="tea-btn" data-tea="green">绿茶</div>
            <div class="tea-btn" data-tea="black">红茶</div>
            <div class="tea-btn" data-tea="oolong">乌龙茶</div>
            <div class="tea-btn" data-tea="white">白茶</div>
        </div>

        <!-- 搭配列表由 JS 动态加载 -->
        <div class="match-list" id="matchList"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="../assets/api.js"></script>
    <script src="../assets/site-header.js"></script>
    <script src="../assets/tea-food.js"></script>
</body>
</html>
