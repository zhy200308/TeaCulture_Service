<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进阶专题馆</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/advanced.css">
    <link rel="stylesheet" href="../assets/site-header.css">
    <script src="../assets/validator.js"></script>
</head>
<body>
    <header id="siteHeader"></header>

    <div class="container">
        <div class="advanced-title">
            <h2>茶文化进阶专题</h2>
            <p>聚焦非遗茶技艺、茶疗养生、茶器文化等细分领域，深度探索茶文化精髓</p>
        </div>

        <!-- 分类标签由 JS 动态加载 -->
        <div class="topic-tabs"></div>

        <!-- 专题列表由 JS 动态加载 -->
        <div class="topic-list" id="topicList"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="../assets/api.js"></script>
    <script src="../assets/site-header.js"></script>
    <script src="../assets/advanced.js"></script>
</body>
</html>
