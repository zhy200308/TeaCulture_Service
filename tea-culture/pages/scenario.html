<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景化教程</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="../assets/mqtt-sim.js"></script>
    <link rel="stylesheet" href="../assets/scenario.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo"><i class="fas fa-leaf"></i></div>
            <nav class="nav-menu">
                <a href="../index.html">首页</a>
                <a href="./basic.html">基础茶识</a>
                <a href="./advanced.html">进阶专题</a>
                <a href="./scenario.html" class="active">场景教程</a>
                <a href="./tea-food.html">茶食搭配</a>
                <a href="./goods.html">好物推荐</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="device-status-bar">
            <span>智能茶器：</span>
            <span id="deviceStatusText">检测中</span>
            <span class="status-indicator" id="deviceStatusIndicator"></span>
        </div>

        <div class="scenario-title">
            <h2>饮茶场景化教程</h2>
            <p>适配不同场景的饮茶方法，轻松掌握各类场景的泡茶技巧</p>
        </div>

        <div class="scenario-tabs">
            <div class="tab-btn active" data-scenario="all">全部场景</div>
            <div class="tab-btn" data-scenario="home">居家饮茶</div>
            <div class="tab-btn" data-scenario="office">办公饮茶</div>
            <div class="tab-btn" data-scenario="outdoor">户外饮茶</div>
        </div>

        <!-- 教程列表由 JS 动态加载 -->
        <div class="scenario-list" id="scenarioList"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="../assets/api.js"></script>
    <script src="../assets/scenario.js"></script>
