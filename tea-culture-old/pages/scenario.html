<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景化教程</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="../assets/validator.js"></script>
<script>
    console.log(mqtt)
</script>
    <script src="../assets/mqtt-sim.js"></script>
    <link rel="stylesheet" href="../assets/scenario.css">
    <script src="../assets/scenario.js" defer></script>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-leaf"></i>
             
            </div>
            <nav class="nav-menu">
                <a href="../index.html">首页</a>
                <a href="./basic.html">基础茶识</a>
                <a href="./advanced.html">进阶专题</a>
                <a href="./scenario.html" class="active">场景教程</a>
                <a href="./tea-food.html">茶食搭配</a>
                <a href="./goods.html">好物推荐</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="device-status-bar">
            <span>智能茶器：</span>
            <span id="deviceStatusText">在线</span>
            <span class="status-indicator" id="deviceStatusIndicator"></span>
        </div>

        <div class="scenario-title">
            <h2>饮茶场景化教程</h2>
            <p>适配不同场景的饮茶方法，轻松掌握各类场景的泡茶技巧</p>
        </div>

        <div class="scenario-tabs">
            <div class="tab-btn active" data-scenario="all">全部场景</div>
            <div class="tab-btn" data-scenario="home">居家饮茶</div>
            <div class="tab-btn" data-scenario="office">办公饮茶</div>
            <div class="tab-btn" data-scenario="outdoor">户外饮茶</div>
        </div>

        <div class="scenario-list" id="scenarioList">
            <div class="scenario-card" data-scenario="home">
                <div class="scenario-card-img">
                    <img src="../images/4.jpg" alt="居家功夫茶">
                </div>
                <div class="scenario-card-content">
                    <span class="scenario-tag">居家饮茶</span>
                    <h3>居家功夫茶冲泡教程</h3>
                    <p class="scenario-desc">用盖碗冲泡乌龙茶，掌握水温、出汤时间，泡出醇厚口感。</p>
                    <div class="view-btn" onclick="openModal('home-kungfu')">查看教程</div>
                </div>
            </div>

            <div class="scenario-card" data-scenario="office">
                <div class="scenario-card-img">
                    <img src="../images/4.1.jpg" alt="办公简易泡茶">
                </div>
                <div class="scenario-card-content">
                    <span class="scenario-tag">办公饮茶</span>
                    <h3>办公室简易泡茶法</h3>
                    <p class="scenario-desc">用马克杯快速冲泡绿茶/红茶，省时省力不影响工作。</p>
                    <div class="view-btn" onclick="openModal('office-simple')">查看教程</div>
                </div>
            </div>

            <div class="scenario-card" data-scenario="outdoor">
                <div class="scenario-card-img">
                    <img src="../images/4.2.jpg" alt="户外便携泡茶">
                </div>
                <div class="scenario-card-content">
                    <span class="scenario-tag">户外饮茶</span>
                    <h3>户外便携泡茶教程</h3>
                    <p class="scenario-desc">用旅行茶具冲泡白茶，轻便易携，适配露营/野餐场景。</p>
                    <div class="view-btn" onclick="openModal('outdoor-portable')">查看教程</div>
                </div>
            </div>

            <div class="scenario-card" data-scenario="home">
                <div class="scenario-card-img">
                    <img src="../images/4.3.jpg" alt="居家冷泡茶">
                </div>
                <div class="scenario-card-content">
                    <span class="scenario-tag">居家饮茶</span>
                    <h3>夏季居家冷泡茶教程</h3>
                    <p class="scenario-desc">用矿泉水冷泡绿茶/乌龙茶，解暑清爽，无需煮水。</p>
                    <div class="view-btn" onclick="openModal('home-cold')">查看教程</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>
</body>
</html>
