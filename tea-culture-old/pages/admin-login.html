<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式 - 与前台统一 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #ffffe6;
            color: #333;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        /* 登录容器 - 使用前台弹窗样式 */
        .login-container {
            width: 400px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 48px;
            color: #8b5a2b;
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 24px;
            color: #8b5a2b;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5a2b;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            height: 46px;
            padding: 0 15px 0 42px;
            border: 1px solid #e0d8cf;
            border-radius: 6px;
            background: #f9f6f2;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #8b5a2b;
            background: #fff;
        }

        .login-btn {
            width: 100%;
            height: 46px;
            background: #8b5a2b;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #6d4521;
        }

        .error-message {
            background: #ffe8e0;
            color: #c45a3a;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 18px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            border: 1px solid #ffd4c8;
        }

        .error-message.show {
            display: flex;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #8b5a2b;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #6d4521;
            gap: 10px;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
        }

        .close:hover {
            color: #8b5a2b;
        }

        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="close" onclick="window.location.href='../index.html'">&times;</div>
        
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1>管理员登录</h1>
            <p>茶文化服务平台管理后台</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">用户名或密码错误</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">管理员账号</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="请输入管理员账号" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">登录密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="请输入登录密码" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                登录管理后台
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </a>
        </div>
    </div>

    <script>
        // 管理员登录凭证（实际项目中应该从后端验证）
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'admin123'
        };

        // 检查是否已登录
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // 验证账号密码
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                // 登录成功
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminLoginTime', new Date().toISOString());
                
                // 显示成功提示
                errorText.textContent = '登录成功，正在跳转...';
                errorMessage.style.background = '#e0f0e8';
                errorMessage.style.color = '#5a8b6b';
                errorMessage.style.borderColor = '#c8e0d4';
                errorMessage.classList.add('show');
                
                // 延迟跳转到管理后台
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                // 登录失败
                errorText.textContent = '账号或密码错误，请重试';
                errorMessage.style.background = '#ffe8e0';
                errorMessage.style.color = '#c45a3a';
                errorMessage.style.borderColor = '#ffd4c8';
                errorMessage.classList.add('show');
                
                // 清空密码框
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // 回车键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
