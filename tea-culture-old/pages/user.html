<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 茶文化服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/user.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <div class="logo-text">茶文化服务平台</div>
            </div>
            
            <div class="nav-right">
                <span class="nav-user-text"><i class="fas fa-user-circle"></i> 欢迎你，茶友用户</span>
                <a href="../index.html" class="nav-btn"><i class="fas fa-sign-out-alt"></i> 返回</a>
            </div>
        </div>
    </header>

    <div class="user-center-wrap">
        <div class="user-card">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2 class="user-name">茶友会员用户</h2>
            <p class="user-desc">热爱茶文化，静心品茶，乐享生活</p>
            <div class="user-tag">普通会员 · 茶文化爱好者</div>
        </div>

        <div class="user-menu-box">
            <div class="user-menu-item">
                <i class="fas fa-id-card"></i>
                <span>个人资料修改</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-history"></i>
                <span>我的学习记录</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-heart"></i>
                <span>我的收藏茶知识</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-shopping-bag"></i>
                <span>我的好物订单</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-cog"></i>
                <span>账号安全设置</span>
            </div>
            <div class="user-menu-item">
                <i class="fas fa-question-circle"></i>
                <span>意见反馈中心</span>
            </div>
        </div>
    </div>

 
</body>
</html>
